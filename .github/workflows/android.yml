name: Android CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Dar permisos a gradlew
        run: chmod +x ./gradlew

      - name: Analisis estatico (detekt)
        run: ./gradlew detekt

      - name: Tests unitarios
        run: ./gradlew test

      - name: Compilar debug
        run: ./gradlew assembleDebug
