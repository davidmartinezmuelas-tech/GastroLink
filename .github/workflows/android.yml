name: Android CI
# CI principal de calidad para cada push/PR.
# Ejecuta análisis estático, tests y compilación debug.

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceptar licencias Android SDK
        run: yes | sdkmanager --licenses

      - name: Instalar paquetes Android SDK
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Dar permisos a gradlew
        run: chmod +x ./gradlew

      - name: Análisis estático (detekt)
        run: ./gradlew detekt --no-daemon

      - name: Tests unitarios
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Compilar debug
        run: ./gradlew assembleDebug --no-daemon
