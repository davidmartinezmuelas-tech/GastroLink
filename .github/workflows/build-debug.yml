name: Build Debug APK
# Build manual bajo demanda para generar artefacto APK debug.

on:
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceptar licencias Android SDK
        run: yes | sdkmanager --licenses

      - name: Instalar paquetes Android SDK
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Dar permisos a gradlew
        run: chmod +x ./gradlew

      - name: Análisis estático (detekt)
        run: ./gradlew detekt --no-daemon

      - name: Tests unitarios
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Compilar APK debug
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Subir artefacto APK debug
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
